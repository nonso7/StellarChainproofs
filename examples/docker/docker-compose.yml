version: "3.9"

services:
  chainproof:
    build:
      context: ../..          # workspace root
      dockerfile: examples/docker/Dockerfile
    image: chainproof-server:latest
    container_name: chainproof-server
    ports:
      - "4243:4243"
    environment:
      # Optional: set a bearer token to secure the API
      # CHAINPROOF_TOKEN: "your-secret-token"

      # Optional: Anthropic key for LLM-enhanced findings
      # ANTHROPIC_API_KEY: "sk-ant-..."

      # Optional: tune rate limiting and body size
      # CHAINPROOF_MAX_REQUESTS: "20"
      # CHAINPROOF_BODY_LIMIT: "10mb"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4243"
      # Uncomment to enable server-side filesystem scanning:
      # - "--allow-fs"
      # Uncomment to require bearer token auth:
      # - "--token"
      # - "your-secret-token"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4243/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
